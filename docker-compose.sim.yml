# IPC pipeline simulator — 10 concurrent load generators
version: "3.9"

x-pipeline: &pipeline
  build: .
  entrypoint: ["pipeline-sim"]
  networks: [ipc-net]
  environment:
    IPC_TARGETS: "val-1:50051,val-2:50051,val-3:50051"
    IPC_INTERVAL: "2s"

services:
  pipeline-sim-1: &ps
    <<: *pipeline
    environment:
      IPC_TARGETS: "val-1:50051,val-2:50051,val-3:50051"
      IPC_INTERVAL: "2s"
      IPC_PIPELINE_ID: "ci-pipeline-1"

