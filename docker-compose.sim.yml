# IPC pipeline simulator — 10 concurrent load generators
version: "3.9"

x-pipeline: &pipeline
  build: .
  entrypoint: ["pipeline-sim"]
  networks: [ipc-net]
  environment:
    IPC_TARGETS: "val-1:50051,val-2:50051,val-3:50051"
    IPC_INTERVAL: "2s"
    IPC_PIPELINE_ID: "ci-${PIPELINE_ID:-0}"

services:
  pipeline-sim-1:
    <<: *pipeline
    environment:
      IPC_PIPELINE_ID: "ci-pipeline-1"
    profiles: ["sim"]

  pipeline-sim-2:
    <<: *pipeline
    environment:
      IPC_PIPELINE_ID: "ci-pipeline-2"
    profiles: ["sim"]

  pipeline-sim-3:
    <<: *pipeline
    environment:
      IPC_PIPELINE_ID: "ci-pipeline-3"
    profiles: ["sim"]

  pipeline-sim-4:
    <<: *pipeline
    environment:
      IPC_PIPELINE_ID: "ci-pipeline-4"
    profiles: ["sim"]

  pipeline-sim-5:
    <<: *pipeline
    environment:
      IPC_PIPELINE_ID: "ci-pipeline-5"
    profiles: ["sim"]

  pipeline-sim-6:
    <<: *pipeline
    environment:
      IPC_PIPELINE_ID: "ci-pipeline-6"
    profiles: ["sim"]

  pipeline-sim-7:
    <<: *pipeline
    environment:
      IPC_PIPELINE_ID: "ci-pipeline-7"
    profiles: ["sim"]

  pipeline-sim-8:
    <<: *pipeline
    environment:
      IPC_PIPELINE_ID: "ci-pipeline-8"
    profiles: ["sim"]

  pipeline-sim-9:
    <<: *pipeline
    environment:
      IPC_PIPELINE_ID: "ci-pipeline-9"
    profiles: ["sim"]

  pipeline-sim-10:
    <<: *pipeline
    environment:
      IPC_PIPELINE_ID: "ci-pipeline-10"
    profiles: ["sim"]
