# IPC (Immutable Provenance Chain) — Prana reference implementation
# 5-validator topology with Prometheus+Grafana monitoring
version: "3.9"

x-validator: &validator
  build: .
  networks: [ipc-net]
  volumes:
    - uids:/uids
    - data:/data
  environment:
    IPC_GRPC_PORT: "50051"
    IPC_METRICS_PORT: "9090"
  depends_on:
    bootstrap:
      condition: service_completed_successfully

services:
  bootstrap:
    build: .
    entrypoint: ["provectl", "init", "--validators", "5", "--out", "/uids"]
    volumes:
      - uids:/uids
    networks: [ipc-net]

  validator-1: &val
    <<: *validator
    container_name: val-1
    environment:
      IPC_NODE_ID: "validator-1"
      IPC_UID_FILE: "/uids/uid-1.cbor"
      IPC_PEERS: "val-2:50051,val-3:50051,val-4:50051,val-5:50051"
    ports: ["50051:50051"]

  validator-2:
    <<: *validator
    container_name: val-2
    environment:
      IPC_NODE_ID: "validator-2"
      IPC_UID_FILE: "/uids/uid-2.cbor"
      IPC_PEERS: "val-1:50051,val-3:50051,val-4:50051,val-5:50051"
    ports: ["50052:50051"]

  validator-3:
    <<: *validator
    container_name: val-3
    environment:
      IPC_NODE_ID: "validator-3"
      IPC_UID_FILE: "/uids/uid-3.cbor"
      IPC_PEERS: "val-1:50051,val-2:50051,val-4:50051,val-5:50051"
    ports: ["50053:50051"]

  validator-4:
    <<: *validator
    container_name: val-4
    environment:
      IPC_NODE_ID: "validator-4"
      IPC_UID_FILE: "/uids/uid-4.cbor"
      IPC_PEERS: "val-1:50051,val-2:50051,val-3:50051,val-5:50051"
    ports: ["50054:50051"]

  validator-5:
    <<: *validator
    container_name: val-5
    environment:
      IPC_NODE_ID: "validator-5"
      IPC_UID_FILE: "/uids/uid-5.cbor"
      IPC_PEERS: "val-1:50051,val-2:50051,val-3:50051,val-4:50051"
    ports: ["50055:50051"]

  prometheus:
    image: prom/prometheus:v2.53
    ports: ["9090:9090"]
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml
    networks: [ipc-net]
    profiles: ["monitor"]

  grafana:
    image: grafana/grafana:11.0
    ports: ["3000:3000"]
    networks: [ipc-net]
    profiles: ["monitor"]

volumes:
  uids:
  data:

networks:
  ipc-net:
    driver: bridge
