syntax = "proto3";
package provenance;
option go_package = "github.com/had-nu/prana-provenance-chain/pkg/server/pb";

service ProvenanceAnchor {
  rpc SubmitHash(SubmitRequest) returns (SubmitResponse);
  rpc WaitForAnchor(WaitRequest) returns (AnchorProof);
  rpc VerifyHash(VerifyRequest) returns (AnchorProof);
  rpc GetCurrentStateRoot(Empty) returns (StateRootResponse);
  rpc GetHealth(Empty) returns (HealthResponse);
  rpc GetBlock(BlockRequest) returns (Block);
  rpc StreamBlocks(BlockRange) returns (stream Block);
}

message SubmitRequest {
  bytes  hash      = 1;
  bytes  submitter = 2;
  bytes  signature = 3;
  int64  timestamp = 4;
  string label     = 5;
}

message SubmitResponse {
  bool   accepted      = 1;
  string status        = 2;
  uint64 block_index   = 3;
  int64  block_time    = 4;
}

message WaitRequest {
  bytes hash = 1;
}

message AnchorProof {
  bool   found           = 1;
  uint64 block_index     = 2;
  int64  block_time      = 3;
  bytes  state_root      = 4;
  bytes  smt_proof       = 5;
  bytes  submitter       = 6;
  string label           = 7;
}

message VerifyRequest {
  bytes hash = 1;
}

message Empty {}

message StateRootResponse {
  bytes  state_root    = 1;
  uint64 block_index   = 2;
  float  lambda1       = 3;
}

message HealthResponse {
  string node_id       = 1;
  string status        = 2;
  uint64 block_height  = 3;
  bytes  current_root  = 4;
  float  lambda1       = 5;
  uint32 active_peers  = 6;
  uint32 total_peers   = 7;
  uint64 pending_hashes = 8;
  float  avg_tps       = 9;
}

message BlockRequest {
  uint64 index = 1;
}

message BlockRange {
  uint64 from = 1;
  uint64 to   = 2;
}

message Block {
  uint64              index       = 1;
  bytes               prev_hash   = 2;
  bytes               state_root  = 3;
  bytes               proposer    = 4;
  repeated bytes      triad       = 5;
  repeated ProvenanceEntry anchored = 6;
  double              lambda1     = 7;
  int64               timestamp   = 8;
  repeated bytes      sigs        = 9;
}

message ProvenanceEntry {
  bytes  hash      = 1;
  bytes  submitter = 2;
  int64  timestamp = 3;
  string label     = 4;
}
